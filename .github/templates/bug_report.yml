name: Bug Report
description: Report a bug or unexpected behavior in KDAL.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for filing a bug report. Please fill in the details below.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief description of the bug.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of KDAL is affected?
      options:
        - Kernel module (src/)
        - Compiler (kdalc)
        - CLI (kdality)
        - VS Code extension
        - Build system (CMake)
        - Documentation / Website
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Host OS, kernel version, QEMU machine, backend, toolchain version.
      placeholder: |
        - Host OS: macOS 14.5 / Ubuntu 22.04
        - Guest kernel: Linux 6.6.80
        - QEMU machine: virt (aarch64)
        - Backend: qemu
        - kdality version: 0.1.0
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Step-by-step instructions to reproduce the issue.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste relevant logs, dmesg output, or error messages.
      render: shell
