name: docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build-docs:
    name: Build documentation site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build site
        working-directory: website
        run: npm run build

      - name: Verify build output
        working-directory: website
        run: |
          PAGE_COUNT=$(find dist -name 'index.html' | wc -l)
          echo "Built ${PAGE_COUNT} pages"
          test "$PAGE_COUNT" -ge 25 || { echo "Expected >= 25 pages"; exit 1; }

          # Verify critical pages exist
          for page in index getting-started/introduction getting-started/installation \
                      language/overview toolchain/compiler kernel/architecture \
                      development/contributing reference/faq; do
            test -f "dist/${page}/index.html" -o -f "dist/index.html" || {
              echo "Missing page: ${page}"; exit 1;
            }
          done

          # Verify search index was generated
          test -d "dist/pagefind" || { echo "Pagefind search index missing"; exit 1; }

          echo "==> Docs build verified"

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: website/dist/

  # Deploy to Vercel on push to main (requires VERCEL_TOKEN secret)
  deploy:
    name: Deploy to Vercel
    needs: [build-docs]
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.VERCEL_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://kdal.vercel.app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: website
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build with Vercel
        working-directory: website
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        working-directory: website
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
